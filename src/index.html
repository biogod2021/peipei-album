<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光书函：我们的故事</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero" id="hero">
        <!-- Replace img path to a correct path from public/assets/img using the dev server proxy or direct path depends on vite configs -->
        <div class="hero-bg" style="background-image: url('/assets/img/天目1.JPG');"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content parallax-element">
            <h1 class="hero-title">时光书函</h1>
            <p class="hero-subtitle">岁岁相伴 · 我们的第二年</p>
            <div class="scroll-indicator">
                <span>SCROLL</span>
                <div class="line"></div>
            </div>
        </div>
    </section>

    <!-- Sticky Navigation -->
    <nav class="sticky-nav">
        <ul>
            <li><a href="#hero">序言</a></li>
            <li><a href="#story">岁月痕迹</a></li>
            <li><a href="#footer">尾声</a></li>
        </ul>
    </nav>

    <!-- Timeline Story Section -->
    <section class="timeline-section" id="story">
        <div class="section-header">
            <h2 class="section-title">点滴印记</h2>
            <p class="section-desc">沿着时间的脉络，重温我们的第二年 🌟</p>
        </div>
        
        <div class="timeline-container" id="timeline-container">
            <div class="timeline-line"></div>
            <!-- Dynamic Content Will Be Inserted Here -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" id="footer">
        <div class="footer-content">
            <h3>家灏 & 佩佩</h3>
            <p>纸短情长，未完待续...</p>
        </div>
    </footer>

    <!-- Fullscreen Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-bg"></div>
        <button class="lightbox-close" id="lightbox-close">×</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Zoomed memory">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
